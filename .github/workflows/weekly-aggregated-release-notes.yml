name: Weekly Aggregated Release Notes

on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: Number of days to look back for releases
        required: false
        default: '7'
        type: string

jobs:
  aggregate-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect releases from organization repositories
        id: collect
        uses: actions/github-script@v8
        env:
          DAYS: ${{ inputs.days || '7' }}
        with:
          github-token: ${{ secrets.PAT_WORKFLOWS != '' && secrets.PAT_WORKFLOWS || github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const org = context.repo.owner;
            const days = Number(process.env.DAYS || '7');
            const since = new Date(Date.now() - days * 24 * 60 * 60 * 1000);

            const repositories = await github.paginate(github.rest.repos.listForOrg, {
              org,
              type: 'all',
              per_page: 100
            });

            const releases = [];

            for (const repository of repositories) {
              const repositoryReleases = await github.paginate(github.rest.repos.listReleases, {
                owner: org,
                repo: repository.name,
                per_page: 100
              });

              for (const release of repositoryReleases) {
                if (release.draft || !release.published_at) {
                  continue;
                }

                const publishedAt = new Date(release.published_at);
                if (publishedAt < since) {
                  continue;
                }

                releases.push({
                  repository: repository.name,
                  title: release.name || release.tag_name,
                  tag: release.tag_name,
                  publishedAt: release.published_at,
                  url: release.html_url,
                  body: (release.body || '').slice(0, 3000)
                });
              }
            }

            releases.sort((left, right) => new Date(right.publishedAt) - new Date(left.publishedAt));

            const workspace = process.env.GITHUB_WORKSPACE;
            fs.writeFileSync(path.join(workspace, 'weekly-releases.json'), JSON.stringify(releases, null, 2));

            core.setOutput('count', `${releases.length}`);
            core.setOutput('since', since.toISOString());

      - name: Summarize releases by category
        if: steps.collect.outputs.count != '0'
        id: summarize
        uses: actions/github-script@v8
        env:
          DAYS: ${{ inputs.days || '7' }}
        with:
          github-token: ${{ secrets.PAT_WORKFLOWS != '' && secrets.PAT_WORKFLOWS || github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const releasesPath = path.join(process.env.GITHUB_WORKSPACE, 'weekly-releases.json');
            const releases = JSON.parse(fs.readFileSync(releasesPath, 'utf8'));
            const days = Number(process.env.DAYS || '7');
            const now = new Date();
            const startDate = new Date(now.getTime() - days * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
            const endDate = now.toISOString().slice(0, 10);

            const categories = ['Added', 'Changed', 'Fixed', 'Removed', 'Security', 'Deprecated'];
            const normalizedToCanonical = new Map(categories.map(category => [category.toLowerCase(), category]));
            const grouped = Object.fromEntries(categories.map(category => [category, []]));

            function isNoUpdateItem(item) {
              const normalized = String(item || '')
                .replace(/[`*_~]/g, '')
                .replace(/\s*\(#\d+\)\s*$/g, '')
                .trim()
                .toLowerCase()
                .replace(/[.!]+$/g, '');

              if (!normalized) {
                return true;
              }

              const exactNoUpdateValues = new Set([
                'none',
                'n/a',
                'na',
                'nothing',
                'no change',
                'no changes',
                'no update',
                'no updates',
                'no fixes',
                'no fix',
                'nothing to report',
                'not applicable'
              ]);

              if (exactNoUpdateValues.has(normalized)) {
                return true;
              }

              return /^no\s+(new\s+)?(changes?|updates?|fixes?|additions?|removals?|deprecations?|security\s+changes?)\b/.test(normalized) ||
                /^nothing\s+(new|to\s+report|was\s+(added|changed|fixed|removed|deprecated|done)|has\s+changed)\b/.test(normalized) ||
                /^there\s+(are|were)\s+no\s+(changes?|updates?|fixes?|additions?|removals?|deprecations?)\b/.test(normalized);
            }

            function parseReleaseBody(body) {
              const parsed = Object.fromEntries(categories.map(category => [category, []]));
              const normalizedBody = String(body || '').replace(/\r\n/g, '\n');
              const lines = normalizedBody.split('\n');
              let activeCategory = null;

              for (const rawLine of lines) {
                const line = rawLine.trim();
                const headingMatch = line.match(/^#{1,6}\s*(Added|Changed|Fixed|Removed|Security|Deprecated)\b/i);
                if (headingMatch) {
                  activeCategory = normalizedToCanonical.get(headingMatch[1].toLowerCase()) || null;
                  continue;
                }

                if (!activeCategory || !line) {
                  continue;
                }

                const bulletMatch = line.match(/^[-*]\s+(.+)$/);
                const numberedMatch = line.match(/^\d+\.\s+(.+)$/);
                if (bulletMatch) {
                  const item = bulletMatch[1].trim();
                  if (!isNoUpdateItem(item)) {
                    parsed[activeCategory].push(item);
                  }
                  continue;
                }

                if (numberedMatch) {
                  const item = numberedMatch[1].trim();
                  if (!isNoUpdateItem(item)) {
                    parsed[activeCategory].push(item);
                  }
                }
              }

              return parsed;
            }

            for (const release of releases) {
              const parsed = parseReleaseBody(release.body);
              for (const category of categories) {
                for (const item of parsed[category]) {
                  grouped[category].push(`- **${release.repository}** ([${release.title}](${release.url})): ${item}`);
                }
              }
            }

            const summaryLines = [`# Aggregated release notes for week of ${startDate} to ${endDate}`, ''];
            for (const category of categories) {
              summaryLines.push(`## ${category}`);
              if (grouped[category].length) {
                summaryLines.push(...grouped[category]);
              } else {
                summaryLines.push('- No updates');
              }
              summaryLines.push('');
            }

            const summary = summaryLines.join('\n').trim();

            fs.writeFileSync(path.join(process.env.GITHUB_WORKSPACE, 'weekly-release-summary.md'), summary);

      - name: Prepare fallback summary
        if: steps.collect.outputs.count == '0'
        run: |
          cat <<'EOF' > weekly-release-summary.md
          No releases were published in the last ${{ inputs.days || '7' }} days.
          EOF

      - name: Commit release digest to repository
        env:
          DAYS: ${{ inputs.days || '7' }}
        run: |
          DAYS="${DAYS:-7}"
          END_DATE=$(date -u +%Y-%m-%d)
          START_DATE=$(date -u -d "${DAYS} days ago" +%Y-%m-%d)
          FILENAME="release-digests/${START_DATE}-to-${END_DATE}.md"

          mkdir -p release-digests
          cp weekly-release-summary.md "${FILENAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${FILENAME}"
          git commit -m "chore: add weekly release digest ${START_DATE} to ${END_DATE}"
          git push
