name: Weekly Aggregated Release Notes

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: Number of days to look back for releases
        required: false
        default: '7'
        type: string

jobs:
  aggregate-release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      models: read

    steps:
      - name: Collect releases from organization repositories
        id: collect
        uses: actions/github-script@v8
        env:
          DAYS: ${{ inputs.days || '7' }}
        with:
          github-token: ${{ secrets.PAT_WORKFLOWS != '' && secrets.PAT_WORKFLOWS || github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const org = context.repo.owner;
            const days = Number(process.env.DAYS || '7');
            const since = new Date(Date.now() - days * 24 * 60 * 60 * 1000);

            const repositories = await github.paginate(github.rest.repos.listForOrg, {
              org,
              type: 'all',
              per_page: 100
            });

            const releases = [];

            for (const repository of repositories) {
              const repositoryReleases = await github.paginate(github.rest.repos.listReleases, {
                owner: org,
                repo: repository.name,
                per_page: 100
              });

              for (const release of repositoryReleases) {
                if (release.draft || !release.published_at) {
                  continue;
                }

                const publishedAt = new Date(release.published_at);
                if (publishedAt < since) {
                  continue;
                }

                releases.push({
                  repository: repository.name,
                  title: release.name || release.tag_name,
                  tag: release.tag_name,
                  publishedAt: release.published_at,
                  url: release.html_url,
                  body: (release.body || '').slice(0, 3000)
                });
              }
            }

            releases.sort((left, right) => new Date(right.publishedAt) - new Date(left.publishedAt));

            const workspace = process.env.GITHUB_WORKSPACE;
            fs.writeFileSync(path.join(workspace, 'weekly-releases.json'), JSON.stringify(releases, null, 2));

            core.setOutput('count', `${releases.length}`);
            core.setOutput('since', since.toISOString());

      - name: Summarize releases with LLM
        if: steps.collect.outputs.count != '0'
        id: summarize
        uses: actions/github-script@v8
        env:
          MODELS_TOKEN: ${{ secrets.PAT_WORKFLOWS != '' && secrets.PAT_WORKFLOWS || github.token }}
        with:
          github-token: ${{ secrets.PAT_WORKFLOWS != '' && secrets.PAT_WORKFLOWS || github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const releasesPath = path.join(process.env.GITHUB_WORKSPACE, 'weekly-releases.json');
            const releases = JSON.parse(fs.readFileSync(releasesPath, 'utf8'));

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${process.env.MODELS_TOKEN}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'openai/gpt-4.1-mini',
                messages: [
                  {
                    role: 'system',
                    content: 'You write concise, professional weekly aggregated release notes in Markdown. Group related repositories together where sensible and highlight important changes.'
                  },
                  {
                    role: 'user',
                    content: `Create release notes for the last week from this JSON: ${JSON.stringify(releases)}`
                  }
                ],
                temperature: 0.2
              })
            });

            let summary = '';

            if (response.ok) {
              const payload = await response.json();
              summary = payload?.choices?.[0]?.message?.content?.trim() || '';
            }

            if (!summary) {
              summary = [
                '## Weekly aggregated release notes',
                '',
                ...releases.map(release => `- [${release.repository}](${release.url}) - **${release.title}** (${release.tag})`)
              ].join('\\n');
            }

            fs.writeFileSync(path.join(process.env.GITHUB_WORKSPACE, 'weekly-release-summary.md'), summary);

      - name: Prepare fallback summary
        if: steps.collect.outputs.count == '0'
        run: |
          cat <<'EOF' > weekly-release-summary.md
          No releases were published in the last ${{ inputs.days || '7' }} days.
          EOF

      - name: Notify @einari with aggregated release notes
        uses: actions/github-script@v8
        env:
          DAYS: ${{ inputs.days || '7' }}
        with:
          github-token: ${{ secrets.PAT_WORKFLOWS != '' && secrets.PAT_WORKFLOWS || github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const days = Number(process.env.DAYS || '7');
            const now = new Date();
            const startDate = new Date(now.getTime() - days * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
            const endDate = now.toISOString().slice(0, 10);

            const summary = fs.readFileSync(path.join(process.env.GITHUB_WORKSPACE, 'weekly-release-summary.md'), 'utf8');
            const title = `Weekly aggregated release notes (${startDate} to ${endDate})`;
            const body = `@einari\n\n${summary}\n\n---\nGenerated by workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
